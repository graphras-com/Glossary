services:
  glossary:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - glossary-data:/data
    environment:
      - DATABASE_PATH=/data/dictionary.db
      # Auth: set AUTH_DISABLED=true for local dev without Entra
      - AUTH_DISABLED=${AUTH_DISABLED:-true}
      - TENANT_ID=${TENANT_ID:-}
      - API_AUDIENCE=${API_AUDIENCE:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:8000}
    restart: unless-stopped

volumes:
  glossary-data:

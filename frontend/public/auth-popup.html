<!doctype html>
<html>
<head>
  <title>Signing in...</title>
</head>
<body>
  <script src="https://alcdn.msauth.net/browser/2.43.2/js/msal-browser.min.js"></script>
  <script>
    // This page runs inside the MSAL popup after Microsoft redirects back.
    // It initialises a minimal MSAL instance to process the auth response,
    // which communicates the result to the parent window via postMessage.
    // The parent window then closes this popup automatically.
    const msalInstance = new msal.PublicClientApplication({
      auth: {
        clientId: "213d5d77-c055-4163-8e6a-56a666a924d2",
        authority: "https://login.microsoftonline.com/3a680226-db04-4df3-95bd-37b631e11597",
        redirectUri: window.location.href.split("?")[0].split("#")[0],
      },
      cache: { cacheLocation: "memoryStorage" },
    });
    msalInstance.initialize().then(function () {
      msalInstance.handleRedirectPromise().catch(function (err) {
        console.error("Popup auth error:", err);
      });
    });
  </script>
</body>
</html>

apiVersion: apps/v1
kind: Deployment
metadata:
  name: __APP_NAME__
  namespace: __NAMESPACE__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: __APP_NAME__
  template:
    metadata:
      labels:
        app: __APP_NAME__
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: __APP_NAME__
          image: ghcr.io/__ORG_GHCR__/__APP_NAME__:__IMAGE_TAG__
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_PATH
              value: /data/dictionary.db
          volumeMounts:
            - name: __APP_NAME__-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: __APP_NAME__-data
          persistentVolumeClaim:
            claimName: __APP_NAME__-data

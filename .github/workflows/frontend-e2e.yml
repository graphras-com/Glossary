name: Reusable Frontend E2E Tests

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version for the backend.
        required: false
        type: string
        default: "3.12"
      node-version:
        description: Node.js version.
        required: false
        type: string
        default: "22"
      install-spec:
        description: Pip install spec for the backend.
        required: false
        type: string
        default: ".[dev]"
      working-directory:
        description: Path to the frontend directory.
        required: false
        type: string
        default: "frontend"

jobs:
  e2e:
    name: Playwright
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "${{ inputs.install-spec }}"
        working-directory: .

      - name: Start backend
        run: |
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          # Wait for backend to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            sleep 1
          done
        working-directory: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm test
        env:
          CI: "true"
          VITE_AUTH_DISABLED: "true"

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ${{ inputs.working-directory }}/test-results/
          retention-days: 7

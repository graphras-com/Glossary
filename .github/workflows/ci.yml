name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Python ────────────────────────────────────────────────────────
  py-lint:
    name: Python Lint
    uses: ./.github/workflows/python-lint.yml

  py-build:
    name: Python Build
    uses: ./.github/workflows/python-ci.yml
    with:
      compile-files: "app/main.py"

  py-test:
    name: Python Test
    uses: ./.github/workflows/python-tests.yml
    with:
      coverage-target: "app"

  # ── Frontend ──────────────────────────────────────────────────────
  fe-lint:
    name: Frontend Lint
    needs: [fe-unit]
    uses: ./.github/workflows/frontend-lint.yml

  fe-build:
    name: Frontend Build
    uses: ./.github/workflows/frontend-build.yml

  fe-unit:
    name: Frontend Unit
    uses: ./.github/workflows/frontend-unit.yml

  fe-e2e:
    name: Frontend E2E
    uses: ./.github/workflows/frontend-e2e.yml

  # ── Security ──────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets
    uses: ./.github/workflows/python-gitleaks.yml
    secrets:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  docker-image:
    name: Docker Image
    needs: [py-lint, py-build, py-test, fe-lint, fe-build, fe-unit, fe-e2e, secrets-scan]
    uses: ./.github/workflows/build-and-push.yml
    with:
      push-image: ${{ github.event_name != 'pull_request' }}
    permissions:
      contents: read
      packages: write

  # ── Release ───────────────────────────────────────────────────────
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [py-lint, py-build, py-test, fe-lint, fe-build, fe-unit, fe-e2e, secrets-scan, docker-image]
    uses: ./.github/workflows/python-release.yml
    permissions:
      contents: write

when:
  - event: [push, manual]
    branch: [main]

steps:
  deploy-staging:
    image: bitnami/kubectl:latest
    pull: true
    environment:
      KUBECONFIG_B64:
        from_secret: KUBECONFIG_B64
      GHCR_USERNAME:
        from_secret: GHCR_USERNAME
      GHCR_TOKEN:
        from_secret: GHCR_TOKEN
      K8S_API_SERVER:
        from_secret: K8S_API_SERVER
      KUBECONFIG: /tmp/kubeconfig
    commands:
      - printf '%s' "$KUBECONFIG_B64" | base64 -d > "$KUBECONFIG"
      - if [ -n "$K8S_API_SERVER" ]; then sed -i "s#https://127.0.0.1:6443#$K8S_API_SERVER#g" "$KUBECONFIG"; fi
      - kubectl apply -f k8s/staging/namespace.yaml
      - kubectl -n glossary-staging create secret docker-registry ghcr-creds --docker-server=ghcr.io --docker-username="$GHCR_USERNAME" --docker-password="$GHCR_TOKEN" --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -f k8s/staging/pvc.yaml
      - kubectl apply -f k8s/staging/deployment.yaml
      - kubectl apply -f k8s/staging/service.yaml
      - kubectl apply -f k8s/staging/ingress.yaml
      - kubectl -n glossary-staging rollout restart deployment/glossary
      - kubectl -n glossary-staging rollout status deployment/glossary --timeout=180s
